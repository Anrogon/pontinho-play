<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pontinho Play - Trocar Senha</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #0b3c66, #0a2238);
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: min(92vw, 430px);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 28px;
    }

    .sub {
      margin: 0 0 18px;
      text-align: center;
      font-size: 14px;
      color: #dbeafe;
      line-height: 1.6;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.10);
      color: #fff;
      font-size: 15px;
    }

    input::placeholder {
      color: rgba(255,255,255,0.70);
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      padding: 12px 14px;
      border: 0;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }

    .primary {
      background: #f0c14b;
      color: #1a1a1a;
    }

    .secondary {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.16);
    }

    .msg {
      min-height: 22px;
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      color: #ffd38a;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Troca obrigatória de senha</h1>
    <p class="sub">
      Sua senha foi redefinida pela administração. Antes de continuar, você precisa cadastrar uma nova senha.
    </p>

    <input type="password" id="newPassword" placeholder="Nova senha">
    <input type="password" id="confirmPassword" placeholder="Confirmar nova senha">

    <div class="actions">
      <button id="btnChangePassword" class="primary" type="button">Salvar nova senha</button>
      <button id="btnBackLogin" class="secondary" type="button">Voltar ao login</button>
    </div>

    <div id="changePasswordMsg" class="msg"></div>
  </div>

  <script src="./js/change-password.js"></script>
</body>
</html>
