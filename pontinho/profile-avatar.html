<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pontinho Play - Escolher Avatar</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #0b3c66, #0a2238);
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      padding: 20px;
      box-sizing: border-box;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 30px;
      text-align: center;
    }

    .sub {
      margin: 0 0 18px;
      color: #dbeafe;
      text-align: center;
      line-height: 1.6;
      font-size: 14px;
    }

    .msg {
      min-height: 22px;
      margin-bottom: 16px;
      text-align: center;
      color: #ffd38a;
      font-size: 14px;
    }

    .current-avatar {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .current-avatar img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .avatar-option {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      transition: 0.18s ease;
      text-align: center;
    }

    .avatar-option:hover {
      transform: translateY(-2px);
      border-color: rgba(240,193,75,0.55);
    }

    .avatar-option.selected {
      border-color: #f0c14b;
      box-shadow: 0 0 0 2px rgba(240,193,75,0.18);
    }

    .avatar-option img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 8px;
      background: rgba(255,255,255,0.08);
    }

    .avatar-label {
      font-size: 12px;
      color: #dbeafe;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 14px;
      border: 0;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-primary {
      background: #f0c14b;
      color: #1a1a1a;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.16);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Escolher Avatar</h1>
      <p class="sub">
        Selecione um avatar para o seu perfil. Ele será usado no site, no placar e nos assentos da mesa.
      </p>

      <div id="avatarMsg" class="msg"></div>

      <div class="current-avatar">
        <img id="currentAvatarPreview" src="/assets/image/avatars/avatar-01.png" alt="Avatar atual">
      </div>

      <div id="avatarGrid" class="avatar-grid"></div>

      <div class="actions">
        <button id="btnSaveAvatar" class="btn-primary" type="button">Salvar Avatar</button>
        <button id="btnBackHome" class="btn-secondary" type="button">Voltar</button>
      </div>
    </div>
  </div>

  <script src="./js/profile-avatar.js"></script>
</body>
</html>
