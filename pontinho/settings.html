<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pontinho Play - Configurações</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #0b3c66, #0a2238);
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    .page-card {
      width: min(92vw, 460px);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 18px;
      text-align: center;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.10);
      color: #fff;
      font-size: 15px;
    }

    input::placeholder {
      color: rgba(255,255,255,0.70);
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      padding: 12px 14px;
      border: 0;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }

    .primary {
      background: #f0c14b;
      color: #1a1a1a;
    }

    .secondary {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.16);
    }

    .msg {
      min-height: 22px;
      text-align: center;
      color: #ffd38a;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="page-card">
    <h1>Configurações</h1>

    <label for="settingsUsername">Nome de usuário</label>
    <input id="settingsUsername" type="text" placeholder="Seu nome">

    <label for="settingsAvatarUrl">URL do avatar</label>
    <input id="settingsAvatarUrl" type="text" placeholder="https://...">

    <label for="settingsNewPassword">Nova senha</label>
    <input id="settingsNewPassword" type="password" placeholder="Nova senha">

    <label for="settingsConfirmPassword">Confirmar nova senha</label>
    <input id="settingsConfirmPassword" type="password" placeholder="Repita a nova senha">

    <div id="settingsMsg" class="msg"></div>

    <div class="actions">
      <button id="btnSaveSettings" class="primary" type="button">Salvar</button>
      <button id="btnBackProfile" class="secondary" type="button">Voltar</button>
    </div>
  </div>

  <script src="./js/settings.js"></script>
</body>
</html>
